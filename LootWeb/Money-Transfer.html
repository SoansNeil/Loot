        <div id="accountInfo"></div>
  
        <section>
        
         <h3>Enter the accountID of the account you'd like to transfer to</h3>
        <div class="Transfer-AccID">
            <form id="CheckAccID" action="/CheckAccID" method="POST">
                <input type="hidden" name="Balance" id="BalanceOG" value="">

                <label>SubscriberID</label>
                <input type="number" name="SubscriberID" required>

                <label>AccountID</label>
                <input type="number" name="AccountID" required>
                <button type="submit">Next</button>
                </form></div>

        </section>
         <script>
     const params = new URLSearchParams(window.location.search);
    const balance = params.get('balance');
    const balanceOG = document.getElementById('BalanceOG');
    if (balance && balanceOG) {
        balanceOG.value = balance;
    }
   
  </script>
