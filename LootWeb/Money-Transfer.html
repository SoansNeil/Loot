<!DOCTYPE HTML>
<html>
<head>
    <title>Transfer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
    <div id="page-wrapper">

        <!-- Header -->
        <header id="header">
            <h1 style ="font-size: xx-large;"><a style= "color: #75975e;"href="index.html">Loot</a> </h1>
            <nav id="nav">
                <ul>
                    <li><a href="Dashboard.html">Dashboard</a></li>
                    <li><a href="Money-Transfer.html">Transfer</a></li>
                
                </ul>
            </nav>
        </header>

        <!-- Empty section for now -->
        <section id="main" class="container">
            <header class="major">
                <h2>Welcome to your transfer feature!</h2>
                <h3>Here you will be able to transfer money to and from accounts</h3>
            </header>
        </section>

        <div id="accountInfo"></div>
  
  <script>
    // JS reads the URL parameters and fills #accountInfo
    const accountInfoDiv = document.getElementById('accountInfo');
    const params = new URLSearchParams(window.location.search);
    const accountID = params.get('accountID');
    const currency=params.get('currency');
    const balance = params.get('balance');

    if (accountID && balance) {
      accountInfoDiv.innerHTML = `<h3>You clicked on account ${accountID} which has a balance of ${currency} ${balance}</h3>`;
    } else {
      accountInfoDiv.innerHTML = `<h3>No account selected</h3>`;
    }
  </script>
        <section>
        
         <h3>Select which account you'd like to transfer to</h3>
        
          
        <h3>How much would you like to transfer ?</h3>

          <h3> Select a Transfer Date and time </h3>



        </section>
        

    </div>

    <!-- Scripts -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
