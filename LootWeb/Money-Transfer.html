<!DOCTYPE HTML>
<html>
<head>
    <title>Transfer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
    <div id="page-wrapper">

        <!-- Header -->
        <header id="header">
					<h1 style ="font-size: xx-large;"><a style= "display:flex; align-items:center; gap:10px; color: #75975e;"href="index.html">Loot <img 
    					src="images/lootLogo.PNG" 
    					style="height:55px; width:auto;"
  						/></a> 
					</h1>
            <nav id="nav">
                <ul>
                    <li><a href="#" onclick="goToDashboard()">Dashboard</a></li>
                    <li><a href="#" onclick="goToExAccounts()">External Accounts</a></li>
                    <li><a href="#" onclick="goToTransfer()">Transfer Funds</a></li>
                    <li><a href="#" onclick="goToBudget()">Budget Expenses</a></li>
                    <li><a href="#" onclick="goToFamily()">Family Joint Account</a></li>
                    <li><a href="#" onclick="goToSummary()">Monthly Summary</a></li>
                    <li><a href="index.html">Log Out</a></li>
                </ul>
            </nav>
        </header>

        <!-- Empty section for now -->
        <section id="main" class="container">
            <header class="major">
                <h2>Welcome to your transfer feature!</h2>
                <h3>Here you will be able to transfer money to and from accounts</h3>
            </header>
        </section>

        <div id="accountInfo"></div>
  
        <section>
        
         <h3>Enter the accountID of the account you'd like to transfer to</h3>
        <div class="Transfer-AccID">
            <form id="CheckAccID" action="/CheckAccID" method="POST">
                <input type="hidden" name="Balance" id="BalanceOG" value="">
                <input type="hidden" name="AccountID" id="AccountID" value="">
                <input type="hidden" name="subscriberID" id="subscriberID" value="">

                <label>Choose which account you want to transfer to </label>
              <input type="number" name="ToAccount" required>
                <button type="submit">Next</button>
                </form></div>
                 <button id="displayExAcc">Show External Accounts</button>
<div id="ExAcc"></div>

        </section>
         <script>
     const params = new URLSearchParams(window.location.search);
    const accountID = params.get('accountID');
    const balance = params.get('balance');
    const subscriberID = params.get('subscriberID'); 
    
    document.getElementById('AccountID').value = accountID;
    document.getElementById('BalanceOG').value = balance;
    document.getElementById('subscriberID').value = subscriberID; 

    const button = document.getElementById('displayExAcc');

button.addEventListener('click', async () => {
    const res = await fetch(`/displayExAcc?subscriberID=${subscriberID}`, { method: 'POST' });
    const text = await res.text();

    // Show results on the page instead of alert
        document.getElementById("ExAcc").innerHTML = text;});
   
  </script>
        
    </div>

    <!-- Scripts -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/nav.js"></script>
</body>
</html>
