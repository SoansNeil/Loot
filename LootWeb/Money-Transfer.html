    <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
        <section style="text-align: center;">
         <h2> Choose an account to transfer to</h2>
            <div id="ExAcc"></div>
      
        </section>
         <script>
     const params = new URLSearchParams(window.location.search);
    const accountID = params.get('accountID');
    const balance = params.get('balance');
    const subscriberID = params.get('subscriberID'); 
    
    document.getElementById('AccountID').value = accountID;
    document.getElementById('BalanceOG').value = balance;
    document.getElementById('subscriberID').value = subscriberID; 

    (async function loadAccounts() {
    if (!subscriberID) {
        document.getElementById("ExAcc").innerHTML = "<p style='color: #999;'>No subscriber ID found. Please sign in again.</p>";
        return;
    }
    
    try {
        const res = await fetch(`/step2?subscriberID=${subscriberID}&excludeAccountID=${accountID}`, { method: 'POST' });
        const text = await res.text();
        document.getElementById("ExAcc").innerHTML = text;
        
        
         } catch (error) {
        document.getElementById("ExAcc").innerHTML = "<p style='color: #c66;'>Unable to load accounts. Please try again later.</p>";
    }
})();



  </script>
