<!DOCTYPE HTML>
<html>
<head>
    <title>External Accounts - Loot</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/employee.css" />
</head>
<body class="is-preload">
    <div id="page-wrapper">

        <header id="header">
					<h1 style ="font-size: xx-large;"><a style= "display:flex; align-items:center; gap:10px; color: #75975e;"href="index.html">Loot <img
    					src="images/lootLogo.PNG"
    					style="height:55px; width:auto;"
  						/></a>
					</h1>
            <nav id="nav">
                <ul>
                    <li><a href="#" onclick="goToDashboard()">Dashboard</a></li>
                    <li><a href="#" onclick="goToExAccounts()">External Accounts</a></li>
                    <li><a href="#" onclick="goToTransfer()">Transfer Funds</a></li>
                    <li><a href="#" onclick="goToBudget()">Budget Expenses</a></li>
                    <li><a href="#" onclick="goToFamily()">Family Joint Account</a></li>
                    <li><a href="#" onclick="goToSummary()">Monthly Summary</a></li>
                    <li><a href="index.html">Log Out</a></li>
                </ul>
            </nav>
        </header>

        <section id="main" class="container">
    <header class="major">
        <h2>External Accounts</h2>
    </header>

     <!-- Add Bank Account -->
       <section class="box">
            <header class="major">
            <h2>Add Bank Account</h2>
            </header>
            
        <form id="createExAcct-form">
                
            <div class = "input-grid">

            <div class="tickets-wrapper">

                <div class="section-header">
                    <h3>Add Bank Account</h3>
                </div>

                <form id="createExAcct-form">
                    <div class="edit-grid">
                        <div class="field-group">
                            <label>Bank Name</label>
                            <input type="text" id="bankName" name="bankName" required>
                        </div>
                        <div class="field-group">
                            <label>Account Type</label>
                            <div style="display: flex; gap: 1.5rem; margin-top: 0.3rem;">
                                <label style="font-weight: normal; cursor: pointer;">
                                    <input type="radio" name="accountType" value="Checking" required> Checking
                                </label>
                                <label style="font-weight: normal; cursor: pointer;">
                                    <input type="radio" name="accountType" value="Credit Card"> Credit Card
                                </label>
                            </div>
                        </div>
                        <div class="field-group">
                            <label>Balance</label>
                            <input type="number" id="currentBalance" name="currentBalance" min="0" required>
                        </div>
                        <div class="field-group">
                            <label>Currency</label>
                            <input type="text" id="currency" name="currency" required>
                        </div>
                        <div class="field-group">
                            <label>Status</label>
                            <select id="syncStatus" name="syncStatus" required>
                                <option>Active</option>
                                <option>Failed</option>
                                <option>Pending</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="action-btn" style="margin-top: 1.2rem;">Add Account</button>
                </form>

                <div class="panel-divider">
                    <div class="section-header">
                        <h3>Linked Accounts</h3>
                    </div>
                    <table id="accounts-table" width="100%">
                        <thead>
                            <tr>
                                <th>Bank</th>
                                <th>Type</th>
                                <th>Balance</th>
                                <th>Currency</th>
                                <th>Status</th>
                                <th>Subscriber</th>
                            </tr>
                        </thead>
                        <tbody id="accounts-tbody"></tbody>
                    </table>
                </div>

            </div>
        </section>

    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/nav.js"></script>

    <script>
        async function loadAccounts() {
            const res = await fetch(`/getExternalAccountsJSON?subscriberID=${subscriberID}`);
            const accounts = await res.json();

            const tbody = document.getElementById('accounts-tbody');
            tbody.innerHTML = '';

            if (!accounts || accounts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">No accounts found.</td></tr>';
                return;
            }

            accounts.forEach(account => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${account.bank}</td>
                    <td>${account.accountType}</td>
                    <td>$${parseFloat(account.currentBalance).toFixed(2)}</td>
                    <td>${account.currency}</td>
                    <td>${account.syncStatus}</td>
                    <td>${subscriberID}</td>
                `;
                tbody.appendChild(row);
            });
        }

        const form = document.getElementById("createExAcct-form");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            formData.set('subscriberId', subscriberID);

            const res = await fetch("/externalAccount", {
                method: "POST",
                body: new URLSearchParams(formData)
            });

            if (res.ok) {
                alert("Account added!");
                form.reset();
                loadAccounts();
            } else {
                alert("Something went wrong.");
            }
        });

        loadAccounts();
    </script>

</body>
</html>
