<!DOCTYPE HTML>
<html>
<head>
    <title>Submit Service Ticket - Loot</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/employee.css" />
</head>
<body class="is-preload">
    <div id="page-wrapper">

        <header id="header" class="alt">
            <h1 style="font-size: xx-large;"><a style="color: #75975e;" href="index.html">Loot</a></h1>
            <nav id="nav">
                <ul>
                    <li><a href="employeeDashboard.html" style="color: #000000;">Employee Dashboard</a></li>
                    <li><a href="employeeCreation.html" style="color: #000000;">Create Employee</a></li>
                    <li><a href="serviceCustomer.html" style="color: #000000;">Submit Service Ticket</a></li>
                    <li><a href="updateCustomer.html" style="color: #000000;">Customer Service</a></li>
                    <li><a href="reviewTicket.html" style="color: #000000;">Review Tickets</a></li>
                </ul>
            </nav>
        </header>

        <section id="main" class="container">
            <header class="major">
                <h2>Customer Service</h2>
            </header>

            <div class="tickets-wrapper">
                <h2 style="text-align: center; padding-top: 0;">Submit a Service Ticket</h2>

                <form id="serviceCustomer-form">
                    <div class="edit-grid">
                        <div class="field-group">
                            <label>Customer Name</label>
                            <input type="text" name="customerName" required>
                        </div>
                        <div class="field-group">
                            <label>Customer Email</label>
                            <input type="email" name="customerEmail" required>
                        </div>
                        <div class="field-group">
                            <label>Employee ID</label>
                            <input type="text" name="employeeID" required>
                        </div>
                        <div class="field-group">
                            <label>Priority</label>
                            <select name="priority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="field-group full-width">
                            <label>Subject</label>
                            <input type="text" name="subject" required>
                        </div>
                        <div class="field-group full-width">
                            <label>Description</label>
                            <textarea name="description" rows="6" required></textarea>
                        </div>
                    </div>
                    <button type="submit" class="action-btn">Create Ticket</button>
                </form>
            </div>
        </section>

    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('serviceCustomer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const res = await fetch('/submitForm', {
                method: 'POST',
                body: new URLSearchParams(formData)
            });
            alert(await res.text());
        });
    </script>
</body>
</html>
