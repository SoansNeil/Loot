<!DOCTYPE HTML>
<html>
<head>
    <title>Submit Service Ticket - Loot</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/employee.css" />
</head>
<body class="is-preload">
    <div id="page-wrapper">

        <header id="header" class="alt">
            <h1 style="font-size: xx-large;"><a style="color: #75975e;" href="index.html">Loot</a></h1>
            <nav id="nav">
                <ul>
                    <li><a href="employeeDashboard.html" style="color: #000000;">Employee Dashboard</a></li>
                    <li><a href="employeeCreation.html" style="color: #000000;">Create Employee</a></li>
                    <li><a href="serviceCustomer.html" style="color: #000000;">Submit Service Ticket</a></li>
                    <li><a href="updateCustomer.html" style="color: #000000;">Customer Service</a></li>
                    <li><a href="reviewTicket.html" style="color: #000000;">Review Tickets</a></li>
                </ul>
            </nav>
        </header>

        <section id="main" class="container">
            <header class="major">
                <h2>Customer Service</h2>
            </header>

            <div class="tickets-wrapper">
                <h2 style="text-align: center; padding-top: 0;">Submit a Service Ticket</h2>

                <form id="serviceCustomer-form">
                    <input type="hidden" name="customerName" id="customerName">
                    <input type="hidden" name="customerEmail" id="customerEmail">

                    <div class="edit-grid">
                        <div class="field-group full-width">
                            <label>Customer Username</label>
                            <div style="display: flex; gap: 0.6rem;">
                                <input type="text" name="customerUsername" id="usernameInput"
                                    placeholder="Enter username…" style="flex: 1;" autocomplete="off">
                                <button type="button" id="lookupBtn"
                                    style="flex-shrink:0; padding:0 1.1rem; height:38px; border:none;
                                           border-radius:5px; background:#75975e; color:white;
                                           font-size:0.9rem; font-weight:600; cursor:pointer;
                                           transition:background 0.15s;"
                                    onmouseover="this.style.background='#4a6741'"
                                    onmouseout="this.style.background='#75975e'">Look Up</button>
                            </div>
                            <span id="lookupStatus" style="font-size:0.8rem; margin-top:4px; min-height:1.1em; display:block;"></span>
                        </div>
                        <div class="field-group">
                            <label>Customer Name</label>
                            <div id="display-customerName"
                                style="padding:8px 10px; border-radius:5px; font-size:0.95rem;
                                       background:#f5f5f5; color:#aaa; border:1px solid #e5e5e5;
                                       min-height:36px; transition: background 0.2s, color 0.2s;">—</div>
                        </div>
                        <div class="field-group">
                            <label>Customer Email</label>
                            <div id="display-customerEmail"
                                style="padding:8px 10px; border-radius:5px; font-size:0.95rem;
                                       background:#f5f5f5; color:#aaa; border:1px solid #e5e5e5;
                                       min-height:36px; transition: background 0.2s, color 0.2s;">—</div>
                        </div>
                        <div class="field-group">
                            <label>Employee ID</label>
                            <input type="text" name="employeeID" id="employeeID" readonly
                                style="background: #f0f4ee; color: #4a6741; cursor: default;">
                        </div>
                        <div class="field-group">
                            <label>Priority</label>
                            <select name="priority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="field-group full-width">
                            <label>Subject</label>
                            <input type="text" name="subject" required>
                        </div>
                        <div class="field-group full-width">
                            <label>Description</label>
                            <textarea name="description" rows="6" required></textarea>
                        </div>
                    </div>
                    <button type="submit" class="action-btn">Create Ticket</button>
                </form>
            </div>
        </section>

    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        fetch('/api/me')
            .then(r => r.json())
            .then(user => { document.getElementById('employeeID').value = user.id; })
            .catch(() => {});

        let customerResolved = false;

        async function lookupCustomer() {
            const username = document.getElementById('usernameInput').value.trim();
            const status   = document.getElementById('lookupStatus');
            const nameBox  = document.getElementById('display-customerName');
            const emailBox = document.getElementById('display-customerEmail');

            if (!username) { status.textContent = 'Please enter a username.'; status.style.color = '#c00'; return; }

            status.textContent = 'Looking up…';
            status.style.color = '#888';

            const res = await fetch('/retrieveUser', {
                method: 'POST',
                body: new URLSearchParams({ username })
            });

            if (res.status === 404) {
                status.textContent = 'No customer found with that username.';
                status.style.color = '#c00';
                customerResolved = false;
                nameBox.textContent  = '—';
                emailBox.textContent = '—';
                nameBox.style.cssText  += '; background:#f5f5f5; color:#aaa; border-color:#e5e5e5;';
                emailBox.style.cssText += '; background:#f5f5f5; color:#aaa; border-color:#e5e5e5;';
                document.getElementById('customerName').value  = '';
                document.getElementById('customerEmail').value = '';
                return;
            }
            if (!res.ok) { status.textContent = 'Lookup failed. Try again.'; status.style.color = '#c00'; return; }

            const user = await res.json();
            const fullName = `${user.FName} ${user.LName}`;

            document.getElementById('customerName').value  = fullName;
            document.getElementById('customerEmail').value = user.Email;

            nameBox.textContent  = fullName;
            emailBox.textContent = user.Email;
            nameBox.style.cssText  += '; background:#f0f4ee; color:#4a6741; border-color:#c5d9bb;';
            emailBox.style.cssText += '; background:#f0f4ee; color:#4a6741; border-color:#c5d9bb;';

            status.textContent = 'Customer found.';
            status.style.color = '#4a6741';
            customerResolved = true;
        }

        document.getElementById('lookupBtn').addEventListener('click', lookupCustomer);
        document.getElementById('usernameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); lookupCustomer(); }
        });

        document.getElementById('serviceCustomer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!customerResolved) {
                alert('Please look up a valid customer username before submitting.');
                return;
            }
            const res = await fetch('/submitForm', {
                method: 'POST',
                body: new URLSearchParams(new FormData(e.target))
            });
            const text = await res.text();
            alert(text);
            if (res.ok) {
                const savedEmpID = document.getElementById('employeeID').value;
                e.target.reset();
                document.getElementById('employeeID').value = savedEmpID;
                document.getElementById('display-customerName').textContent  = '—';
                document.getElementById('display-customerEmail').textContent = '—';
                customerResolved = false;
            }
        });
    </script>
</body>
</html>
