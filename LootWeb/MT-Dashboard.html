<!DOCTYPE HTML>
<html>
<head>
    <title>Dashboard</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
    <div id="page-wrapper">

        <!-- Header -->
        <header id="header">
            <h1 style="font-size: xx-large;"><a style="color: #75975e;" href="index.html">Loot</a></h1>
            <nav id="nav">
                <ul>
                    <li><a href="#" onclick="goToDashboard()">Dashboard</a></li>
                    <li><a href="#" onclick="goToExAccounts()">External Accounts</a></li>
                    <li><a href="#" onclick="goToTransfer()">Transfer Funds</a></li>
                    <li><a href="#" onclick="goToBudget()">Budget Expenses</a></li>
                    <li><a href="#" onclick="goToFamily()">Family Joint Account</a></li>
                    <li><a href="#" onclick="goToSummary()">Monthly Summary</a></li>
                    <li><a href="index.html">Log Out</a></li>
                </ul>
            </nav>
        </header>

        <section id="main" class="container">
            <header class="major">
                <h2>Welcome to your personal Dashboard!</h2>
                <h3>Here you will be able to view and manage all of your accounts</h3>
            </header>
        </section>

        <section>
            <h2>Your Checking Account has</h2>
            <button id="displayExAcc">Show External Accounts</button>
            <div id="ExAcc"></div>
        </section>

    </div>

    <!-- Template Scripts FIRST -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/nav.js"></script>

    <script>
        document.getElementById('displayExAcc').addEventListener('click', async () => {
            const res = await fetch(`/displayExAcc?subscriberID=${subscriberID}`, { method: 'POST' });
            const text = await res.text();
            document.getElementById('ExAcc').innerHTML = text;
        });
    </script>

</body>
</html>
