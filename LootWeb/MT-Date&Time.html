<!DOCTYPE HTML>
<html>
<head>
    <title>Schedule Transfer - Loot</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/employee.css" />
</head>
<body class="is-preload">
<div id="page-wrapper">

    <header id="header">
				<h1 style ="font-size: xx-large;"><a style= "display:flex; align-items:center; gap:10px; color: #75975e;"href="index.html">Loot <img
    					src="images/lootLogo.PNG"
    					style="height:44px; width:auto;"
  						/></a>
					</h1>
        <nav id="nav">
            <ul>
                <li><a href="#" onclick="goToDashboard()">Dashboard</a></li>
                <li><a href="#" onclick="goToExAccounts()">External Accounts</a></li>
                <li><a href="#" onclick="goToTransfer()">Transfer Funds</a></li>
                <li><a href="#" onclick="goToBudget()">Budget Expenses</a></li>
                <li><a href="#" onclick="goToFamily()">Family Joint Account</a></li>
                <li><a href="#" onclick="goToSummary()">Monthly Summary</a></li>
                <li><a href="index.html">Log Out</a></li>
            </ul>
        </nav>
    </header>

        <div class="tickets-wrapper">

            <!-- Transfer summary -->
            <div class="section-header">
                <h3>Transfer Summary</h3>
            </div>
            <p id="summaryText" style="color: #4a6741; font-weight: 700; font-size: 1.05rem; margin-bottom: 1.5rem;"></p>

            <div class="panel-divider">
                <form id="scheduleForm" action="/StoreSchedule" method="POST">

                    <input type="hidden" name="amount" id="amount">
                    <input type="hidden" name="fromAccount" id="fromAccount">
                    <input type="hidden" name="toAccount" id="toAccount">
                    <input type="hidden" name="subscriberID" id="hiddenSubscriberID">

                    <div class="section-header">
                        <h3>When would you like to transfer?</h3>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem;">
                        <div class="schedule-option" onclick="selectOption('now')" id="optNow"
                            style="border: 2px solid #e5e5e5; border-radius: 8px; padding: 1rem; cursor: pointer; transition: border-color 0.15s;">
                            <input type="radio" name="scheduleType" value="now" id="scheduleNow">
                            <label for="scheduleNow" style="cursor: pointer; font-weight: 600;">
                                Transfer Now — <span style="font-weight: 400; color: #666;">Process immediately</span>
                            </label>
                        </div>

                        <div class="schedule-option" onclick="selectOption('later')" id="optLater"
                            style="border: 2px solid #e5e5e5; border-radius: 8px; padding: 1rem; cursor: pointer; transition: border-color 0.15s;">
                            <input type="radio" name="scheduleType" value="later" id="scheduleLater">
                            <label for="scheduleLater" style="cursor: pointer; font-weight: 600;">
                                Transfer Later — <span style="font-weight: 400; color: #666;">Schedule for the future</span>
                            </label>
                        </div>
                    </div>

                    <div id="dateTimePicker" style="display: none;">
                        <div class="section-header">
                            <h3>Select a Date and Time</h3>
                        </div>
                        <div class="edit-grid">
                            <div class="field-group">
                                <label>Date</label>
                                <input type="date" name="transferDate" id="transferDate">
                            </div>
                            <div class="field-group">
                                <label>Time (24hr)</label>
                                <input type="time" name="transferTime" id="transferTime">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="action-btn" style="margin-top: 1.5rem;">Finalize Transfer</button>

                </form>
            </div>
        </div>
    </section>

</div>

<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/jquery.dropotron.min.js"></script>
<script src="assets/js/jquery.scrollex.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/nav.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    const amount = params.get('amount');
    const accountID = params.get('accountID');
    const toAccount = params.get('toAccount');
    const subID = params.get('subscriberID');

    document.getElementById('amount').value = amount;
    document.getElementById('fromAccount').value = accountID;
    document.getElementById('toAccount').value = toAccount;
    document.getElementById('hiddenSubscriberID').value = subID;

    if (amount && accountID && toAccount) {
        document.getElementById('summaryText').textContent =
            `Transferring $${parseFloat(amount).toFixed(2)} from Account #${accountID} to Account #${toAccount}`;
    } else {
        const el = document.getElementById('summaryText');
        el.textContent = 'Missing transfer details. Please go back and try again.';
        el.style.color = 'red';
    }

    const _now = new Date();
    const _pad = n => String(n).padStart(2, '0');
    const today = `${_now.getFullYear()}-${_pad(_now.getMonth() + 1)}-${_pad(_now.getDate())}`;
    document.getElementById('transferDate').min = today;

    function selectOption(option) {
        const picker = document.getElementById('dateTimePicker');
        const optNow = document.getElementById('optNow');
        const optLater = document.getElementById('optLater');

        if (option === 'later') {
            picker.style.display = 'block';
            document.getElementById('scheduleLater').checked = true;
            optLater.style.borderColor = '#75975e';
            optNow.style.borderColor = '#e5e5e5';
        } else {
            picker.style.display = 'none';
            document.getElementById('scheduleNow').checked = true;
            optNow.style.borderColor = '#75975e';
            optLater.style.borderColor = '#e5e5e5';
        }
    }

    document.getElementById('scheduleForm').addEventListener('submit', function(e) {
        const scheduleType = document.querySelector('input[name="scheduleType"]:checked');

        if (!scheduleType) {
            e.preventDefault();
            alert('Please select Transfer Now or Transfer Later.');
            return;
        }

        if (scheduleType.value === 'later') {
            const date = document.getElementById('transferDate').value;
            const time = document.getElementById('transferTime').value;
            if (!date || !time) {
                e.preventDefault();
                alert('Please select both a date and time for your transfer.');
                return;
            }
        }

        if (!amount || !accountID || !toAccount || !subID) {
            e.preventDefault();
            alert('Missing transfer details. Please go back and try again.');
            return;
        }
    });
</script>

</body>
</html>
