<!DOCTYPE HTML>
<html>
<head>
    <title>Create Employee - Loot</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/employee.css" />
</head>
<body class="is-preload">
    <div id="page-wrapper">

        <header id="header" class="alt">
            <h1 style="font-size: xx-large;"><a style="color: #75975e;" href="index.html">Loot</a></h1>
            <nav id="nav">
                <ul>
                    <li><a href="employeeDashboard.html" style="color: #000000;">Employee Dashboard</a></li>
                    <li><a href="employeeCreation.html" style="color: #000000;">Create Employee</a></li>
                    <li><a href="serviceCustomer.html" style="color: #000000;">Submit Service Ticket</a></li>
                    <li><a href="updateCustomer.html" style="color: #000000;">Customer Service</a></li>
                    <li><a href="reviewTicket.html" style="color: #000000;">Review Tickets</a></li>
                </ul>
            </nav>
        </header>

        <section id="main" class="container">
            <header class="major">
                <h2>Create New Employee</h2>
            </header>

            <div class="tickets-wrapper">
                <h2 style="text-align: center; padding-top: 0;">Employee Creation</h2>

                <form id="employeeCreation-form">
                    <div class="edit-grid">
                        <div class="field-group">
                            <label>First Name</label>
                            <input type="text" name="eFName" required>
                        </div>
                        <div class="field-group">
                            <label>Last Name</label>
                            <input type="text" name="eLName" required>
                        </div>
                        <div class="field-group">
                            <label>Username</label>
                            <input type="text" name="eUsername" required>
                        </div>
                        <div class="field-group">
                            <label>Password</label>
                            <input type="password" name="ePassword" required>
                        </div>
                        <div class="field-group">
                            <label>Email</label>
                            <input type="email" name="employeeEmail" required>
                        </div>
                        <div class="field-group">
                            <label>Phone Number</label>
                            <input type="text" name="ePhone" required>
                        </div>
                        <div class="field-group full-width">
                            <label>Birthday</label>
                            <input type="date" name="eBirthday" required>
                        </div>
                    </div>
                    <button type="submit" class="action-btn">Create Employee</button>
                </form>
            </div>
        </section>

    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('employeeCreation-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const res = await fetch('/employeeCreation', {
                method: 'POST',
                body: new URLSearchParams(formData)
            });
            alert(await res.text());
        });
    </script>
</body>
</html>
