         <h2 > Your Checking Account has</h2>
        
           
          <button id="displayExAcc">Show External Accounts</button>
<div id="ExAcc"></div>

<script>
const button = document.getElementById('displayExAcc');

button.addEventListener('click', async () => {
    const res = await fetch('/displayExAcc', { method: 'POST' });
    const text = await res.text();

    // Show results on the page instead of alert
    document.getElementById("ExAcc").innerHTML = text;
});
</script>
