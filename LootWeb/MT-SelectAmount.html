<!DOCTYPE HTML>
<html>
<head>
    <title>Transfer Amount - Loot</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/employee.css" />
</head>
<body class="is-preload">
<div id="page-wrapper">

    <header id="header">
				<h1 style ="font-size: xx-large;"><a style= "display:flex; align-items:center; gap:10px; color: #75975e;"href="index.html">Loot <img
    					src="images/lootLogo.PNG"
    					style="height:55px; width:auto;"
  						/></a>
					</h1>
        <nav id="nav">
            <ul>
                <li><a href="#" onclick="goToDashboard()">Dashboard</a></li>
                <li><a href="#" onclick="goToExAccounts()">External Accounts</a></li>
                <li><a href="#" onclick="goToTransfer()">Transfer Funds</a></li>
                <li><a href="#" onclick="goToBudget()">Budget Expenses</a></li>
                <li><a href="#" onclick="goToFamily()">Family Joint Account</a></li>
                <li><a href="#" onclick="goToSummary()">Monthly Summary</a></li>
                <li><a href="index.html">Log Out</a></li>
            </ul>
        </nav>
    </header>

        <div class="tickets-wrapper">
            <div class="section-header">
                <h3>How much would you like to transfer?</h3>
            </div>

            <div class="Transfer-Amount" style="margin-bottom: 1.2rem;"></div>

            <form action="/StoreAmount" method="POST">
                <input type="hidden" name="balance" id="balanceOG">
                <input type="hidden" name="accountID" id="accountID">
                <input type="hidden" name="toAccount" id="toAccount">
                <input type="hidden" name="subscriberID" id="hiddenSubscriberID">

                <div class="field-group">
                    <label>Amount to Transfer</label>
                    <input type="number" name="Tamount" id="Tamount" step="0.01" min="0" required>
                </div>

                <button type="submit" class="action-btn" style="margin-top: 1.2rem;">Next</button>
            </form>
        </div>
    </section>

</div>

<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/jquery.dropotron.min.js"></script>
<script src="assets/js/jquery.scrollex.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/nav.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);

    const balance = params.get('balance');
    if (balance) {
        const p = document.createElement('p');
        p.style.cssText = 'color: #4a6741; font-weight: 700; font-size: 1.05rem;';
        p.textContent = 'Available balance: $' + parseFloat(balance).toFixed(2);
        document.querySelector('.Transfer-Amount').appendChild(p);
    }

    document.getElementById('balanceOG').value = params.get('balance');
    document.getElementById('accountID').value = params.get('accountID');
    document.getElementById('toAccount').value = params.get('toAccount');
    document.getElementById('hiddenSubscriberID').value = params.get('subscriberID');
</script>

</body>
</html>
