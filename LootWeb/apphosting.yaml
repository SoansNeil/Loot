runConfig:
  minInstances: 1

scripts:
  buildCommand: npm install
  startCommand: node server.js

env:
  - variable: DB_HOST
    value: maglev.proxy.rlwy.net
    availability:
      - RUNTIME
  - variable: DB_PORT
    value: "13455"
    availability:
      - RUNTIME
  - variable: DB_USER
    value: root
    availability:
      - RUNTIME
  - variable: DB_DATABASE
    value: railway
    availability:
      - RUNTIME
  - variable: DB_PASSWORD
    secret: DB_PASSWORD
  - variable: JWT_TOKEN
    secret: JWT_TOKEN