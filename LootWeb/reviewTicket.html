<!DOCTYPE HTML>
<html>
<head>
    <title>Review Tickets - Loot</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/employee.css" />
</head>
<body class="is-preload">
    <div id="page-wrapper">

			<!-- Header -->
				<header id="header">
					<h1 style ="font-size: xx-large;"><a style= "display:flex; align-items:center; gap:10px; color: #75975e;"href="index.html">Loot <img 
    					src="images/lootLogo.PNG" 
    					style="height:44px; width:auto;"
  						/></a> 
					</h1>
					<nav id="nav">
						<ul>
							<li><a href="employeeDashboard.html" >Employee Dashboard</a></li>
							<li><a href="employeeCreation.html">Create Employee</a></li>
                            <li><a href="serviceCustomer.html">Submit Service Ticket</a></li>
                            <li><a href="updateCustomer.html">Customer Service</a></li>
							<li><a href="reviewTicket.html">Review Tickets</a></li>
                            <li><a href="index.html">Log Out</a></li>
						</ul>
                    </nav>
                </header>
        <div class="signUp-box">
        <section id="main" class="container">
            <header class="major">
                <h2>Review Forms</h2>
            </header>

            <div class="tickets-wrapper">
                <h2 style="text-align:center; padding-top: 0;">Open Tickets</h2>

                <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: flex-end;">
                    <div class="field-group" style="flex: 1; min-width: 160px; margin: 0;">
                        <label>Customer Name</label>
                        <input type="text" id="filter-name" placeholder="Search name…" oninput="filterTickets()">
                    </div>
                    <div class="field-group" style="flex: 1; min-width: 120px; margin: 0;">
                        <label>Employee ID</label>
                        <input type="text" id="filter-employee" placeholder="ID…" oninput="filterTickets()">
                    </div>
                    <div class="field-group" style="min-width: 130px; margin: 0;">
                        <label>Priority</label>
                        <select id="filter-priority" onchange="filterTickets()">
                            <option value="">All</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="field-group" style="min-width: 160px; margin: 0;">
                        <label>Date From</label>
                        <input type="date" id="filter-date" onchange="filterTickets()">
                    </div>
                    <div class="field-group" style="min-width: 160px; margin: 0;">
                        <label>Sort Priority</label>
                        <select id="sort-priority" onchange="filterTickets()">
                            <option value="">Default</option>
                            <option value="high-low">High → Low</option>
                            <option value="low-high">Low → High</option>
                        </select>
                    </div>
                </div>

                <div id="ticket-list"><p class="empty-state">Loading tickets…</p></div>

                <div class="review-panel" id="review-panel">
                    <div class="review-panel-header" style="justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <h3>Ticket Details</h3>
                            <span class="form-id-badge" id="panel-id-badge"></span>
                        </div>
                        <button type="button" onclick="closePanel()" style="background: none; border: 1px solid #ddd; border-radius: 5px; padding: 4px 12px; cursor: pointer; font-size: 0.85rem; color: #666; transition: border-color 0.15s, color 0.15s;" onmouseover="this.style.borderColor='#75975e';this.style.color='#75975e'" onmouseout="this.style.borderColor='#ddd';this.style.color='#666'">Close</button>
                    </div>
                    <form id="review-form">
                        <input type="hidden" name="formID">
                        <input type="hidden" name="customerName">
                        <input type="hidden" name="customerEmail">
                        <input type="hidden" name="employeeID">
                        <input type="hidden" name="subject">
                        <input type="hidden" name="priority">
                        <input type="hidden" name="description">

                        <div class="detail-grid">
                            <div class="detail-field full-width">
                                <label>Customer Username</label>
                                <div class="detail-value" id="d-customerUsername"></div>
                            </div>
                            <div class="detail-field">
                                <label>Customer Name</label>
                                <div class="detail-value" id="d-customerName"></div>
                            </div>
                            <div class="detail-field">
                                <label>Customer Email</label>
                                <div class="detail-value" id="d-customerEmail"></div>
                            </div>
                            <div class="detail-field">
                                <label>Subject</label>
                                <div class="detail-value" id="d-subject"></div>
                            </div>
                            <div class="detail-field">
                                <label>Priority</label>
                                <div class="detail-value" id="d-priority"></div>
                            </div>
                            <div class="detail-field full-width">
                                <label>Description</label>
                                <div class="detail-value" id="d-description"></div>
                            </div>
                            <div class="detail-field">
                                <label>Employee ID</label>
                                <div class="detail-value" id="d-employeeID"></div>
                            </div>
                            <div class="detail-field">
                                <label>Time Submitted</label>
                                <div class="detail-value" id="d-createdAt"></div>
                            </div>
                            <div class="detail-field full-width">
                                <label>Additional Comments</label>
                                <input type="text" name="Comments" placeholder="Enter any comments…">
                            </div>
                        </div>
                        <button type="submit" class="action-btn">Submit Review</button>
                    </form>
                </div>
            </div>

            <div class="panel-divider" style="margin-top: 2rem;">
                <div class="review-panel-header" style="justify-content: space-between; margin-bottom: 1rem;">
                    <h3>Closed Forms</h3>
                    <button type="button" id="toggle-closed-btn" onclick="toggleClosedForms()" style="background: none; border: 1px solid #ddd; border-radius: 5px; padding: 4px 12px; cursor: pointer; font-size: 0.85rem; color: #666; transition: border-color 0.15s, color 0.15s;" onmouseover="this.style.borderColor='#75975e';this.style.color='#75975e'" onmouseout="this.style.borderColor='#ddd';this.style.color='#666'">Show</button>
                </div>
                <div id="closed-forms-section" style="display: none;">
                    <div id="closed-forms-list"><p class="empty-state">Loading…</p></div>
                    <div id="closed-detail-panel" class="review-panel" style="margin-top: 1rem;"></div>
                </div>
            </div>

        </section>
    </div>

    <script>
        const ticketList  = document.getElementById('ticket-list');
        const reviewPanel = document.getElementById('review-panel');
        const reviewForm  = document.getElementById('review-form');

        let allTickets = [];

        const priorityOrder = { high: 0, medium: 1, low: 2 };

        function priorityClass(p) {
            if (!p) return 'priority-low';
            const v = p.toLowerCase();
            if (v === 'high')   return 'priority-high';
            if (v === 'medium') return 'priority-medium';
            return 'priority-low';
        }

        function formatDate(raw) {
            if (!raw) return '—';
            const d = new Date(raw);
            return isNaN(d) ? raw : d.toLocaleString();
        }

        function renderTickets(tickets) {
            if (!tickets.length) {
                ticketList.innerHTML = '<p class="empty-state">No tickets match your filters.</p>';
                return;
            }
            ticketList.innerHTML = tickets.map((f, i) => `
                <div class="ticket-card" data-id="${f.formID}" onclick="selectTicket(${f.formID})">
                    <div class="ticket-card-left">
                        <span class="ticket-subject">${f.subject || '(No subject)'}</span>
                        <span class="ticket-meta">${f.customerName} &middot; ${formatDate(f.createdAt)}</span>
                    </div>
                    <div class="ticket-card-right">
                        <span class="priority-badge ${priorityClass(f.priority)}">${f.priority || 'Low'}</span>
                        <span class="form-id-badge">#${f.formID}</span>
                    </div>
                </div>
            `).join('');
        }

        function filterTickets() {
            const name     = document.getElementById('filter-name').value.trim().toLowerCase();
            const empID    = document.getElementById('filter-employee').value.trim().toLowerCase();
            const priority = document.getElementById('filter-priority').value;
            const dateFrom = document.getElementById('filter-date').value;
            const sort     = document.getElementById('sort-priority').value;

            let filtered = allTickets.filter(f => {
                if (name && !(f.customerName || '').toLowerCase().includes(name)) return false;
                if (empID && !String(f.employeeID ?? f.EmployeeID ?? '').toLowerCase().includes(empID)) return false;
                if (priority && (f.priority || '').toLowerCase() !== priority.toLowerCase()) return false;
                if (dateFrom && new Date(f.createdAt) < new Date(dateFrom)) return false;
                return true;
            });

            if (sort === 'high-low') {
                filtered.sort((a, b) =>
                    (priorityOrder[a.priority?.toLowerCase()] ?? 3) - (priorityOrder[b.priority?.toLowerCase()] ?? 3));
            } else if (sort === 'low-high') {
                filtered.sort((a, b) =>
                    (priorityOrder[b.priority?.toLowerCase()] ?? 3) - (priorityOrder[a.priority?.toLowerCase()] ?? 3));
            }

            renderTickets(filtered);
        }

        async function loadTickets() {
            const res = await fetch('/getForms');
            if (!res.ok) { ticketList.innerHTML = '<p class="empty-state">Failed to load tickets.</p>'; return; }
            allTickets = await res.json();

            if (!allTickets.length) {
                ticketList.innerHTML = '<p class="empty-state">No open tickets.</p>';
                return;
            }

            renderTickets(allTickets);
        }

        async function selectTicket(formID) {
            // Highlight selected card
            document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('active'));
            const card = document.querySelector(`.ticket-card[data-id="${formID}"]`);
            if (card) card.classList.add('active');

            const res = await fetch('/retrieveForm', {
                method: 'POST',
                body: new URLSearchParams({ formID })
            });
            if (!res.ok) { alert('Failed to load ticket details.'); return; }
            const form = await res.json();

            // Populate hidden fields
            reviewForm.querySelector('[name="formID"]').value       = form.formID;
            reviewForm.querySelector('[name="customerName"]').value = form.customerName;
            reviewForm.querySelector('[name="customerEmail"]').value = form.customerEmail;
            reviewForm.querySelector('[name="employeeID"]').value   = form.EmployeeID;
            reviewForm.querySelector('[name="subject"]').value      = form.subject;
            reviewForm.querySelector('[name="priority"]').value     = form.priority;
            reviewForm.querySelector('[name="description"]').value  = form.description;
            reviewForm.querySelector('[name="Comments"]').value     = '';

            // Populate display fields
            document.getElementById('panel-id-badge').textContent      = `#${form.formID}`;
            document.getElementById('d-customerUsername').textContent  = form.customerUsername || '—';
            document.getElementById('d-customerName').textContent      = form.customerName;
            document.getElementById('d-customerEmail').textContent     = form.customerEmail;
            document.getElementById('d-subject').textContent        = form.subject;
            document.getElementById('d-priority').textContent       = form.priority;
            document.getElementById('d-description').textContent    = form.description;
            document.getElementById('d-employeeID').textContent     = form.EmployeeID;
            document.getElementById('d-createdAt').textContent      = formatDate(form.createdAt);

            reviewPanel.classList.add('visible');
            reviewPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closePanel() {
            reviewPanel.classList.remove('visible');
            document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('active'));
        }

        reviewForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/reviewForm', {
                method: 'POST',
                body: new URLSearchParams(new FormData(reviewForm))
            });
            const text = await res.text();
            alert(text);
            reviewPanel.classList.remove('visible');
            await loadTickets();
        });

        loadTickets();

        let closedFormsLoaded = false;
        let allClosedForms = [];

        async function toggleClosedForms() {
            const section = document.getElementById('closed-forms-section');
            const btn = document.getElementById('toggle-closed-btn');
            const isHidden = section.style.display === 'none';

            section.style.display = isHidden ? 'block' : 'none';
            btn.textContent = isHidden ? 'Hide' : 'Show';

            if (isHidden && !closedFormsLoaded) {
                await loadClosedForms();
            }
        }

        async function loadClosedForms() {
            const res = await fetch('/getClosedForms');
            if (!res.ok) {
                document.getElementById('closed-forms-list').innerHTML = '<p class="empty-state">Failed to load closed forms.</p>';
                return;
            }
            allClosedForms = await res.json();
            closedFormsLoaded = true;
            renderClosedForms(allClosedForms);
        }

        function renderClosedForms(forms) {
            const list = document.getElementById('closed-forms-list');
            if (!forms.length) {
                list.innerHTML = '<p class="empty-state">No closed forms.</p>';
                return;
            }
            list.innerHTML = forms.map(f => `
                <div class="ticket-card" data-closed-id="${f.formID}" onclick="selectClosedForm(${f.formID})" style="border-left: 4px solid #75975e;">
                    <div class="ticket-card-left">
                        <span class="ticket-subject">${f.subject || '(No subject)'}</span>
                        <span class="ticket-meta">${f.customerName} &middot; Employee #${f.EmployeeID}</span>
                    </div>
                    <div class="ticket-card-right">
                        <span class="priority-badge ${priorityClass(f.priority)}">${f.priority || 'Low'}</span>
                        <span class="form-id-badge">#${f.formID}</span>
                    </div>
                </div>
            `).join('');
        }

        function selectClosedForm(formID) {
            document.querySelectorAll('[data-closed-id]').forEach(c => c.classList.remove('active'));
            const card = document.querySelector(`[data-closed-id="${formID}"]`);
            if (card) card.classList.add('active');

            const f = allClosedForms.find(x => x.formID === formID);
            if (!f) return;

            const panel = document.getElementById('closed-detail-panel');
            panel.innerHTML = `
                <div class="review-panel-header" style="justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <h3>Closed Ticket Details</h3>
                        <span class="form-id-badge">#${f.formID}</span>
                    </div>
                    <button type="button" onclick="closeClosedPanel()" style="background: none; border: 1px solid #ddd; border-radius: 5px; padding: 4px 12px; cursor: pointer; font-size: 0.85rem; color: #666;" onmouseover="this.style.borderColor='#75975e';this.style.color='#75975e'" onmouseout="this.style.borderColor='#ddd';this.style.color='#666'">Close</button>
                </div>
                <div class="detail-grid">
                    <div class="detail-field">
                        <label>Customer Name</label>
                        <div class="detail-value">${f.customerName || '—'}</div>
                    </div>
                    <div class="detail-field">
                        <label>Customer Email</label>
                        <div class="detail-value">${f.customerEmail || '—'}</div>
                    </div>
                    <div class="detail-field">
                        <label>Subject</label>
                        <div class="detail-value">${f.subject || '—'}</div>
                    </div>
                    <div class="detail-field">
                        <label>Priority</label>
                        <div class="detail-value">${f.priority || '—'}</div>
                    </div>
                    <div class="detail-field full-width">
                        <label>Description</label>
                        <div class="detail-value">${f.description || '—'}</div>
                    </div>
                    <div class="detail-field">
                        <label>Employee ID</label>
                        <div class="detail-value">${f.EmployeeID || '—'}</div>
                    </div>
                    <div class="detail-field full-width">
                        <label>Comments</label>
                        <div class="detail-value">${f.comments || '—'}</div>
                    </div>
                </div>
            `;
            panel.classList.add('visible');
            panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closeClosedPanel() {
            const panel = document.getElementById('closed-detail-panel');
            panel.classList.remove('visible');
            document.querySelectorAll('[data-closed-id]').forEach(c => c.classList.remove('active'));
        }
    </script>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
