<!DOCTYPE HTML>
<html>
<head>
    <title>Summary Dashboard</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- chart.js library-->

</head>

<body>
    <div id="page-wrapper">

        <!-- Header -->
        <header id="header">
            <h1 style ="font-size: xx-large;"><a style= "color: #75975e;"href="index.html">Loot</a> </h1>
            <nav id="nav">
                <ul>
                    <li><a href="dashboard.html">Summary Dashboard</a></li>
                    <li><a href="index.html">Log Out</a></li>
                </ul>
            </nav>
        </header>

        <section id="main" class="container">
            <header class="major">
                <h2>Welcome! Here's your monthly spending so far.</h2>
            </header>

            <!-- chart container -->
            <div class="chart-card">
                <div class="month-filter">
                    <label for="monthSelect">Month:</label>
                    <input type="month" id="monthSelect">
                </div>

                <h3>Spending by Category</h3>
                <div class="chart-wrapper">
                    <canvas id="categoryDonutChart"></canvas>
                </div>
                <p id="chartMessage"></p>

                <div id="categoryTotalsSection">
                    <h4>Category Totals</h4>
                        <ul id="categoryTotalsList"></ul>
                </div>

                <div id="transactionDetailsSection">
                    <h4 id="transactionDetailsTitle">Transactions</h4>
                        <ul id="transactionDetailsList"></ul>
                </div>
            </div>
        </section>

    </div>

    <!-- Scripts -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>


    <script>
    let donutChart = null;
    const accountId = 1; //replace with logged in users account ID once feature is implemented
    let selectedCategory = null;

    const categoryColors = { //defines colors for each category in donut chart using predefined colors from chart.js color palette
        "Food & drink": "#ff9f40",
        "Bills & utilities": "#ff6384",
        "Personal": "#9966ff",
        "Entertainment": "#36a2eb",
        "Transportation": "#4bc0c0",
        "Cash out": "#ffcd56"
    };

    const monthInput = document.getElementById("monthSelect");

    const now = new Date(); //set date to current month by default
    monthInput.value = now.toISOString().slice(0, 7); //turns date to string and keeps format with month and year only

    function loadCategoryChart() { //function to get category totalsfor donut chart and trans list
        const [year, month] = monthInput.value.split("-"); //splits month and year into two variables for query parameters

        fetch(`/api/category-totals/${accountId}?month=${month}&year=${year}`) //sends request to backend to get category totals for month and year user selects
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to fetch chart data');
                }
                return response.json();
            })
            .then(data => {
                const message = document.getElementById('chartMessage');
                const ctx = document.getElementById('categoryDonutChart').getContext('2d');
                const categoryTotalsList = document.getElementById('categoryTotalsList');
                const transactionTitle = document.getElementById('transactionDetailsTitle');
                const transactionList = document.getElementById('transactionDetailsList');

                categoryTotalsList.innerHTML = ''; //clears category listto be refilled with new data after month changes

                if (!data || data.length === 0) { //if no trans data available, output message
                    message.textContent = 'No transaction data available for this month.';

                    if (donutChart) { //checks if chart exists before getting rid of it to avoid errors
                        donutChart.destroy(); //destroys chart if no data exists for selected date to avoid showing data from previous selected date
                        donutChart = null; //reset chart var
                    }

                    transactionTitle.textContent = 'Transactions'; //resets trans list title to default title
                    transactionList.innerHTML = ''; //clears trans list details
                    selectedCategory = null;
                    return;
                }

                message.textContent = ''; //clears message if data exists

                const labels = data.map(item => item.Category); //gets category names from data to use as labels in chart
                const totals = data.map(item => Number(item.Total)); //gets category totals from data to use as total values in chart

                if (!donutChart) { //if chart doesnt exist ...
                    donutChart = new Chart(ctx, { //create new chart
                        type: 'doughnut', //use donut chart from chart.js
                        data: {
                            labels: labels, //use category names as labels for chart
                            datasets: [{ //define dataset for chart
                            label: 'Spending by Category', //dataset label for chart
                            data: totals, //use category totals data for chart values
                            backgroundColor: labels.map(category => categoryColors[category] || "#cccccc") //set background colors for categories in chart using predefined colors
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: {
                                    position: 'bottom' //put chart legend at bottom of chart
                                },
                                title: {
                                    display: false //dont show chart built in title since added own title in html
                                }
                            }
                        }
                    });
                } 
                else { //if chart exists, update with new data
                    donutChart.data.labels = labels; //replace chart labels with new category names
                    donutChart.data.datasets[0].data = totals; //replace chart data with new values for totals
                    donutChart.data.datasets[0].backgroundColor = //update chart colors in case categories change from month to month
                    labels.map(category => categoryColors[category] || "#cccccc");

                 donutChart.update(); //update chart to show new data
                }

                data.forEach(item => { //for each category total, create list item in category total list with category name and total amount
                    const li = document.createElement('li');
                    li.className = 'category-item';

                    if (selectedCategory === item.Category) { //if category is selected, add active class
                        li.classList.add('active');
                    }

                    //setting html inside list item that shows category name and total up to 2 decimal places
                    li.innerHTML = ` 
                        <div class="category-row">
                            <span>${item.Category}</span>
                            <span>$${Number(item.Total).toFixed(2)}</span>
                        </div>
                    `;

                    li.addEventListener('click', () => { //when category is clicked
                        selectedCategory = item.Category;

                        document.querySelectorAll('.category-item').forEach(el => { //remove active class from all category items
                            el.classList.remove('active');
                        });
                        li.classList.add('active'); //and add active class to clicked category

                        loadCategoryTransactions(item.Category); //call function to load transactions for selected category
                    });

                    categoryTotalsList.appendChild(li); //add category item to category total list
                });

                // reload the selected category's transactions after month change
                if (selectedCategory) { //if a category is currently selected
                    const stillExists = data.some(item => item.Category === selectedCategory); //check if previously selected category still exists in new data after month change

                    if (stillExists) { //if category still exists in new data, reload transactions for that category
                        loadCategoryTransactions(selectedCategory); //call function to load transactions for selected category
                    } else { //else if category doesnt exist in new data, reset title, clear list, and reset selected category since previously selected category no longer exists in new data after month change
                        transactionTitle.textContent = 'Transactions';
                        transactionList.innerHTML = '';
                        selectedCategory = null;
                    }
                }
            })
            .catch(error => {
                console.error('Error loading chart:', error);
                document.getElementById('chartMessage').textContent =
                    'Unable to load spending chart right now.';
            });
    } //end of loadCategoryChart function

    function loadCategoryTransactions(category) {
        const [year, month] = monthInput.value.split("-"); //splits month and year into two variables for query parameters

        fetch(`/api/category-transactions/${accountId}/${encodeURIComponent(category)}?month=${month}&year=${year}`) //send request to backend for category transactions
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to fetch transactions');
                }
                return response.json();
            })
            .then(data => {
                const title = document.getElementById('transactionDetailsTitle'); //get html elements for trans title and list
                const list = document.getElementById('transactionDetailsList');

                title.textContent = `${category} Transactions`; //update title
                list.innerHTML = ''; //clear trans list if any exists to add new transactions for selected category

                if (!data || data.length === 0) { //if no transactions for category selected output message
                    list.innerHTML = '<li class="transaction-item">No transactions found for this category.</li>';
                    return;
                }

                data.forEach(item => { //for each transaction ...
                    const li = document.createElement('li'); //create list item
                    li.className = 'transaction-item'; //add class for styling

                    const date = new Date(item.TransactionDate); //convert transaction date string to date object
                    const formattedDate = date.toLocaleDateString(); //format date to be more readable for users

                    //lines 239-247 set html for each trans list item to show merchant name, amount, date, and description. Also formats amount to 2 decimal places
                    li.innerHTML = `
                        <div class="transaction-row">
                            <strong>${item.MerchantName || 'Unknown Merchant'}</strong>
                            <span>$${Number(item.Amount).toFixed(2)}</span>
                        </div>
                        <div class="transaction-meta">
                            ${formattedDate}${item.Description ? ' • ' + item.Description : ''}
                        </div>
                    `;

                    list.appendChild(li); //add trans list item to trans list in html
                });
            })
            .catch(error => {
                console.error('Error loading transactions:', error);
                document.getElementById('transactionDetailsTitle').textContent = 'Transactions';
                document.getElementById('transactionDetailsList').innerHTML =
                    '<li class="transaction-item">Unable to load transactions right now.</li>';
            });
        } //end of loadCategoryTransactions function

        monthInput.addEventListener("change", () => { //when month input changes, reload category chart, totals, and transactions for new data
            loadCategoryChart();
        });

    loadCategoryChart(); //run function to load chart when page first loads with default month set to current month
</script>
</body>
</html>
