			<!-- Banner -->

					<h3>Here you will be able to plan and manage financial goals with users on your family plan. </h3>

				</section>

			<!-- Main -->
			 <section>
				<p>Users in your family:</p>

				 <button id="displayFam">Show Family Accounts</button>
				 <div id="FamAcc"></div>

			</section>

			 <Section>
				<p>Family Goals:</p>
			</Section>

			 <section>
				<p>Donations:</p>
			</section>

			<section>
				<p> Family message board:</p>
			</section>

						
			<script>
			const urlParams = new URLSearchParams(window.location.search);
			const subscriberID = urlParams.get('subscriberID');

			const button = document.getElementById('displayFamAcc');

			button.addEventListener('click', async () => {
				const res = await fetch(`/displayFamAcc?subscriberID=${subscriberID}`, { method: 'POST' });
				const text = await res.text();

				// Show results on the page instead of alert
				document.getElementById("FamAcc").innerHTML = text;
			});
			</script>
