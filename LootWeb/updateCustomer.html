<!DOCTYPE HTML>
<html>
<head>
    <title>Retrieve Customer - Loot</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/employee.css" />
</head>
<body class="is-preload">
    <div id="page-wrapper">

        <header id="header" class="alt">
            <h1 style="font-size: xx-large;"><a style="color: #75975e;" href="index.html">Loot</a></h1>
            <nav id="nav">
                <ul>
                    <li><a href="employeeDashboard.html" style="color: #000000;">Employee Dashboard</a></li>
                    <li><a href="employeeCreation.html" style="color: #000000;">Create Employee</a></li>
                    <li><a href="serviceCustomer.html" style="color: #000000;">Submit Service Ticket</a></li>
                    <li><a href="updateCustomer.html" style="color: #000000;">Customer Service</a></li>
                    <li><a href="reviewTicket.html" style="color: #000000;">Review Tickets</a></li>
                </ul>
            </nav>
        </header>

        <section id="main" class="container">
            <header class="major">
                <h2>Retrieve Customer</h2>
            </header>

            <div class="tickets-wrapper">
                <h2 style="text-align: center; padding-top: 0;">Enter Customer Username</h2>

                <form id="retrieve-form">
                    <div class="field-group">
                        <label>Customer Username</label>
                        <input type="text" name="username" required>
                    </div>
                    <button type="submit" class="action-btn" style="margin-top: 1.2rem;">Retrieve</button>
                </form>

                <div id="result"></div>
            </div>
        </section>

    </div>

    <script>
    const form = document.getElementById('retrieve-form');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        result.textContent = 'Retrieving user…';

        const res = await fetch('/retrieveUser', {
            method: 'POST',
            body: new URLSearchParams(new FormData(form))
        });

        if (res.status === 403) { result.textContent = 'Access denied. Must be logged in as an employee.'; return; }
        if (res.status === 404) { result.textContent = 'User not found.'; return; }
        if (!res.ok)            { result.textContent = 'Retrieval failed.'; return; }

        const user = await res.json();
        const birthday = user.Birthday ? user.Birthday.split('T')[0] : '';

        result.innerHTML = `
        <div class="edit-card">
            <div class="edit-card-header">
                <h3>Customer Details</h3>
                <span class="subscriber-badge">ID #${user.SubscriberID}</span>
            </div>
            <form id="edit-form">
                <input type="hidden" name="SubscriberID" value="${user.SubscriberID}">
                <div class="edit-grid">
                    <div class="field-group">
                        <label>First Name</label>
                        <input name="FName" value="${user.FName}" required>
                    </div>
                    <div class="field-group">
                        <label>Last Name</label>
                        <input name="LName" value="${user.LName}" required>
                    </div>
                    <div class="field-group full-width">
                        <label>Username</label>
                        <input name="Username" value="${user.Username}" required>
                    </div>
                    <div class="field-group full-width">
                        <label>Email</label>
                        <input name="Email" type="email" value="${user.Email}" required>
                    </div>
                    <div class="field-group">
                        <label>Phone</label>
                        <input name="PhoneNumber" value="${user.PhoneNumber}" required>
                    </div>
                    <div class="field-group">
                        <label>Birthday</label>
                        <input name="Birthday" type="date" value="${birthday}">
                    </div>
                </div>
                <button type="submit" class="action-btn" style="margin-top: 1.2rem;">Save Changes</button>
            </form>
        </div>
        `;

        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const updateRes = await fetch('/updateUser', {
                method: 'POST',
                body: new URLSearchParams(new FormData(document.getElementById('edit-form')))
            });
            alert(await updateRes.text());
        });
    });
    </script>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.dropotron.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
