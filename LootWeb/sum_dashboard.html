<!DOCTYPE HTML>
<html>
<head>
    <title>Monthly Summary - Loot</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/employee.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="is-preload">
<div id="page-wrapper">

    <header id="header">
        <h1 style="font-size: xx-large;"><a style="color: #75975e;" href="index.html">Loot</a></h1>
        <nav id="nav">
            <ul>
                <li><a href="#" onclick="goToDashboard()">Dashboard</a></li>
                <li><a href="#" onclick="goToExAccounts()">External Accounts</a></li>
                <li><a href="#" onclick="goToTransfer()">Transfer Funds</a></li>
                <li><a href="#" onclick="goToBudget()">Budget Expenses</a></li>
                <li><a href="#" onclick="goToFamily()">Family Joint Account</a></li>
                <li><a href="#" onclick="goToSummary()">Monthly Summary</a></li>
                <li><a href="index.html">Log Out</a></li>
            </ul>
        </nav>
    </header>

    <section id="main" class="container">
        <header class="major">
            <h2>Monthly Summary</h2>
        </header>

        <div class="tickets-wrapper">

            <div class="section-header" style="justify-content: space-between; align-items: center;">
                <h3>Spending by Category</h3>
                <div class="field-group" style="margin: 0; min-width: 180px;">
                    <label>Month</label>
                    <input type="month" id="monthSelect">
                </div>
            </div>

            <div class="chart-wrapper" style="max-width: 400px; margin: 1.5rem auto;">
                <canvas id="categoryDonutChart"></canvas>
            </div>
            <p id="chartMessage" style="text-align: center; color: #888;"></p>

            <div class="panel-divider" id="categoryTotalsSection">
                <div class="section-header">
                    <h3>Category Totals</h3>
                </div>
                <ul id="categoryTotalsList" style="list-style: none; padding: 0; margin: 0;"></ul>
            </div>

            <div class="panel-divider" id="transactionDetailsSection">
                <div class="section-header">
                    <h3 id="transactionDetailsTitle">Transactions</h3>
                </div>
                <ul id="transactionDetailsList" style="list-style: none; padding: 0; margin: 0;"></ul>
            </div>

        </div>
    </section>

</div>

<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/jquery.dropotron.min.js"></script>
<script src="assets/js/jquery.scrollex.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/nav.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    const accountId = params.get('accountId') || subscriberID;

    let donutChart = null;
    let selectedCategory = null;

    const categoryColors = {
        "Food & drink": "#ff9f40",
        "Bills & utilities": "#ff6384",
        "Personal": "#9966ff",
        "Entertainment": "#36a2eb",
        "Transportation": "#4bc0c0",
        "Cash out": "#ffcd56"
    };

    const monthInput = document.getElementById("monthSelect");
    const now = new Date();
    monthInput.value = now.toISOString().slice(0, 7);

    function loadCategoryChart() {
        const [year, month] = monthInput.value.split("-");

        fetch(`/api/category-totals/${accountId}?month=${month}&year=${year}`)
            .then(response => {
                if (!response.ok) throw new Error('Failed to fetch chart data');
                return response.json();
            })
            .then(data => {
                const message = document.getElementById('chartMessage');
                const ctx = document.getElementById('categoryDonutChart').getContext('2d');
                const categoryTotalsList = document.getElementById('categoryTotalsList');
                const transactionTitle = document.getElementById('transactionDetailsTitle');
                const transactionList = document.getElementById('transactionDetailsList');

                categoryTotalsList.innerHTML = '';

                if (!data || data.length === 0) {
                    message.textContent = 'No transaction data available for this month.';
                    if (donutChart) { donutChart.destroy(); donutChart = null; }
                    transactionTitle.textContent = 'Transactions';
                    transactionList.innerHTML = '';
                    selectedCategory = null;
                    return;
                }

                message.textContent = '';

                const labels = data.map(item => item.Category);
                const totals = data.map(item => Number(item.Total));

                if (!donutChart) {
                    donutChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Spending by Category',
                                data: totals,
                                backgroundColor: labels.map(c => categoryColors[c] || "#cccccc")
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { position: 'bottom' },
                                title: { display: false }
                            }
                        }
                    });
                } else {
                    donutChart.data.labels = labels;
                    donutChart.data.datasets[0].data = totals;
                    donutChart.data.datasets[0].backgroundColor = labels.map(c => categoryColors[c] || "#cccccc");
                    donutChart.update();
                }

                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'category-item';
                    if (selectedCategory === item.Category) li.classList.add('active');

                    li.innerHTML = `
                        <div class="category-row">
                            <span>${item.Category}</span>
                            <span>$${Number(item.Total).toFixed(2)}</span>
                        </div>
                    `;

                    li.addEventListener('click', () => {
                        selectedCategory = item.Category;
                        document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        loadCategoryTransactions(item.Category);
                    });

                    categoryTotalsList.appendChild(li);
                });

                if (selectedCategory) {
                    const stillExists = data.some(item => item.Category === selectedCategory);
                    if (stillExists) {
                        loadCategoryTransactions(selectedCategory);
                    } else {
                        transactionTitle.textContent = 'Transactions';
                        transactionList.innerHTML = '';
                        selectedCategory = null;
                    }
                }
            })
            .catch(error => {
                console.error('Error loading chart:', error);
                document.getElementById('chartMessage').textContent = 'Unable to load spending chart right now.';
            });
    }

    function loadCategoryTransactions(category) {
        const [year, month] = monthInput.value.split("-");

        fetch(`/api/category-transactions/${accountId}/${encodeURIComponent(category)}?month=${month}&year=${year}`)
            .then(response => {
                if (!response.ok) throw new Error('Failed to fetch transactions');
                return response.json();
            })
            .then(data => {
                const title = document.getElementById('transactionDetailsTitle');
                const list = document.getElementById('transactionDetailsList');

                title.textContent = `${category} Transactions`;
                list.innerHTML = '';

                if (!data || data.length === 0) {
                    list.innerHTML = '<li class="transaction-item">No transactions found for this category.</li>';
                    return;
                }

                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'transaction-item';
                    const formattedDate = new Date(item.TransactionDate).toLocaleDateString();

                    li.innerHTML = `
                        <div class="transaction-row">
                            <strong>${item.MerchantName || 'Unknown Merchant'}</strong>
                            <span>$${Number(item.Amount).toFixed(2)}</span>
                        </div>
                        <div class="transaction-meta">
                            ${formattedDate}${item.Description ? ' • ' + item.Description : ''}
                        </div>
                    `;

                    list.appendChild(li);
                });
            })
            .catch(error => {
                console.error('Error loading transactions:', error);
                document.getElementById('transactionDetailsTitle').textContent = 'Transactions';
                document.getElementById('transactionDetailsList').innerHTML =
                    '<li class="transaction-item">Unable to load transactions right now.</li>';
            });
    }

    monthInput.addEventListener("change", loadCategoryChart);
    loadCategoryChart();
</script>

</body>
</html>
